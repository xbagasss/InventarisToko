<ion-content [fullscreen]="true">
  <div class="login-wrapper">
    
    <!-- Animated background nodes -->
    <div class="bg-blur blur-1"></div>
    <div class="bg-blur blur-2"></div>

    <div class="login-container">
      <div class="logo-section">
        <div class="logo-box">
          <ion-icon name="logo-buffer"></ion-icon>
        </div>
        <h1>Ubah<span>Password</span></h1>
        <p>Atur ulang password untuk akun Anda</p>
      </div>

      <div class="card login-card">
        <div class="input-group">
          <label>Username Anda</label>
          <div class="input-field">
            <ion-icon name="person-outline"></ion-icon>
            <input type="text" [(ngModel)]="username" placeholder="Masukkan username">
          </div>
        </div>

        <div class="input-group">
          <label>Password Baru</label>
          <div class="input-field">
            <ion-icon name="lock-closed-outline"></ion-icon>
            <input type="password" [(ngModel)]="newPassword" placeholder="Masukkan password baru">
          </div>
        </div>

        <div class="input-group">
          <label>Konfirmasi Password</label>
          <div class="input-field">
            <ion-icon name="lock-closed-outline"></ion-icon>
            <input type="password" [(ngModel)]="confirmPassword" placeholder="Ulangi password">
          </div>
        </div>

        <button class="login-btn" (click)="onResetPassword()">
          <span>Simpan Perubahan</span>
        </button>

        <div class="login-footer">
          <p (click)="goToLogin()">Kembali ke <span>Halaman Login</span></p>
        </div>
      </div>

      <div class="system-status">
        <div class="dot"></div>
        <span>Sistem Offline Terenkripsi</span>
      </div>
    </div>
  </div>
</ion-content>
